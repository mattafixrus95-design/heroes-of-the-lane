<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1a1a2e"/>

  <!-- Castle towers -->
  <rect x="60"  y="180" width="110" height="260" rx="6" fill="#4a7c59"/>
  <rect x="342" y="180" width="110" height="260" rx="6" fill="#4a7c59"/>

  <!-- Main wall -->
  <rect x="130" y="240" width="252" height="200" rx="4" fill="#3a6b3a"/>

  <!-- Left battlements -->
  <rect x="60"  y="148" width="30" height="40" rx="3" fill="#4a7c59"/>
  <rect x="104" y="148" width="30" height="40" rx="3" fill="#4a7c59"/>
  <rect x="148" y="148" width="18" height="40" rx="3" fill="#4a7c59"/>

  <!-- Right battlements -->
  <rect x="346" y="148" width="18" height="40" rx="3" fill="#4a7c59"/>
  <rect x="378" y="148" width="30" height="40" rx="3" fill="#4a7c59"/>
  <rect x="422" y="148" width="30" height="40" rx="3" fill="#4a7c59"/>

  <!-- Wall battlements -->
  <rect x="134" y="210" width="32" height="38" rx="3" fill="#3a6b3a"/>
  <rect x="202" y="210" width="32" height="38" rx="3" fill="#3a6b3a"/>
  <rect x="270" y="210" width="32" height="38" rx="3" fill="#3a6b3a"/>
  <rect x="338" y="210" width="24" height="38" rx="3" fill="#3a6b3a"/>

  <!-- Gate -->
  <rect x="196" y="328" width="120" height="112" rx="4" fill="#1a1a2e"/>
  <path d="M196,350 Q256,296 316,350" fill="#1a1a2e"/>

  <!-- Portcullis bars -->
  <line x1="216" y1="328" x2="216" y2="440" stroke="#2a2a4e" stroke-width="10"/>
  <line x1="246" y1="328" x2="246" y2="440" stroke="#2a2a4e" stroke-width="10"/>
  <line x1="276" y1="328" x2="276" y2="440" stroke="#2a2a4e" stroke-width="10"/>
  <line x1="306" y1="328" x2="306" y2="440" stroke="#2a2a4e" stroke-width="10"/>
  <line x1="196" y1="370" x2="316" y2="370" stroke="#2a2a4e" stroke-width="8"/>
  <line x1="196" y1="410" x2="316" y2="410" stroke="#2a2a4e" stroke-width="8"/>

  <!-- Flag pole -->
  <line x1="256" y1="60" x2="256" y2="185" stroke="#888" stroke-width="8"/>
  <!-- Flag -->
  <polygon points="256,60 360,95 256,130" fill="#f0c040"/>

  <!-- Tower windows -->
  <rect x="86"  y="240" width="56" height="70" rx="4" fill="#1a1a2e"/>
  <rect x="370" y="240" width="56" height="70" rx="4" fill="#1a1a2e"/>

  <!-- Stone lines -->
  <line x1="60"  y1="260" x2="170" y2="260" stroke="#2a5a2a" stroke-width="4" opacity="0.5"/>
  <line x1="60"  y1="310" x2="170" y2="310" stroke="#2a5a2a" stroke-width="4" opacity="0.5"/>
  <line x1="342" y1="260" x2="452" y2="260" stroke="#2a5a2a" stroke-width="4" opacity="0.5"/>
  <line x1="342" y1="310" x2="452" y2="310" stroke="#2a5a2a" stroke-width="4" opacity="0.5"/>
</svg>
