name: Auto PR + Merge

on:
  push:
    branches:
      - 'feature/**'

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create & merge PR
        run: |
          git checkout "$GITHUB_REF_NAME"
          gh pr create --base master --fill || true
          gh pr merge --merge --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
